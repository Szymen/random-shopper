apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace_name }}
  labels:
    app_name: {{ .Values.app.name }}
    chart_name: {{ .Chart.Name }}
    chart_version: {{ .Chart.Version }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.app.name }}-serviceaccount
  namespace: {{ .Values.namespace_name }}
  labels:
    app_name: {{ .Values.app.name }}
    chart_name: {{ .Chart.Name }}
    chart_version: {{ .Chart.Version }} 
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.app.name }}-secret-access-role
  namespace: {{ .Values.namespace_name }}
  labels:
    app_name: {{ .Values.app.name }}
    chart_name: {{ .Chart.Name }}
    chart_version: {{ .Chart.Version }} 
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.app.name }}-secret-access-binding
subjects:
- kind: ServiceAccount
  name: {{ .Values.app.name }}-serviceaccount
roleRef:
  kind: Role
  name: {{ .Values.app.name }}-secret-access-role
  apiGroup: rbac.authorization.k8s.io