{{- $dbClaimName := dig "persistence" "name" "db-data" .Values.db }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $dbClaimName | quote }}
  namespace: {{ .Values.namespace_name }}
  labels:
    app.kubernetes.io/component: "db"
spec:
  accessModes:
    {{- range (default (list "ReadWriteOnce") .Values.db.persistence.accessModes) }}
    - {{ . | quote }}
    {{- end }}
  resources:
    requests:
      storage: {{ default "1Gi" .Values.db.persistence.size | quote }}
  {{- if hasKey .Values.db.persistence "storageClassName" }}
  storageClassName: {{ .Values.db.persistence.storageClassName | quote }}
  {{- end }}

---
apiVersion: v1
kind: Pod
metadata:
  name: db
  namespace: {{ .Values.namespace_name }}
  labels:
    app.kubernetes.io/component: "db"
spec:
  containers:
    - name: postgres
      image: {{ default "postgres:16-alpine" .Values.db.image | quote }}
      imagePullPolicy: {{ default "IfNotPresent" .Values.db.imagePullPolicy }}
      ports:
        - name: postgres
          containerPort: 5432
          protocol: TCP
      volumeMounts:
        - name: db-data
          mountPath: {{ default "/var/lib/postgresql/data" .Values.db.persistence.mountPath | quote }}
      env:
        - name: POSTGRES_USER
          value: {{ default "customer" .Values.db.postgresUser | quote }}
        - name: POSTGRES_PASSWORD
          value: {{ default "customer" .Values.db.postgresPassword | quote }}
        - name: POSTGRES_DB
          value: {{ default "customer_mgmt" .Values.db.postgresDb | quote }}
      livenessProbe:
        exec:
          command:
            - /bin/sh
            - -c
            - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
        initialDelaySeconds: 10
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 10

      readinessProbe:
        exec:
          command:
            - /bin/sh
            - -c
            - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
        initialDelaySeconds: 10
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 10

  volumes:
    - name: db-data
      persistentVolumeClaim:
        claimName: {{ $dbClaimName | quote }}

---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: {{ .Values.namespace_name }}
  labels:
    app.kubernetes.io/component: "db"
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    app.kubernetes.io/component: "db"
