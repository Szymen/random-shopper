name: CI - Tests + Docker build/push

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

  # Define these as GitHub Repository Variables.
  # Example values:
  #   DOCKERHUB_REPO_CUSTOMER_FACE=youruser/customer-face
  #   DOCKERHUB_REPO_CUSTOMER_MANAGEMENT=youruser/customer-management
  DOCKERHUB_REPO_CUSTOMER_FACE: ${{ vars.DOCKERHUB_REPO_CUSTOMER_FACE }}
  DOCKERHUB_REPO_CUSTOMER_MANAGEMENT: ${{ vars.DOCKERHUB_REPO_CUSTOMER_MANAGEMENT }}

jobs:
  ci:
    name: CI (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: customer-management
            dockerhub_repo_env: DOCKERHUB_REPO_CUSTOMER_MANAGEMENT
          - service: customer-face
            dockerhub_repo_env: DOCKERHUB_REPO_CUSTOMER_FACE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt

      - name: Install + test
        working-directory: ${{ matrix.service }}
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt
          pytest -q

      - name: Docker build (test stage)
        run: docker build -f ${{ matrix.service }}/Dockerfile --target test ./${{ matrix.service }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          target: runtime
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push:
    name: Push images to Docker Hub
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub repo variables
        shell: bash
        run: |
          set -euo pipefail
          : "${DOCKERHUB_REPO_CUSTOMER_MANAGEMENT:?Missing repo variable DOCKERHUB_REPO_CUSTOMER_MANAGEMENT}"
          : "${DOCKERHUB_REPO_CUSTOMER_FACE:?Missing repo variable DOCKERHUB_REPO_CUSTOMER_FACE}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          sha="${GITHUB_SHA::7}"
          ref_type="${GITHUB_REF_TYPE}"   # branch | tag
          ref_name="${GITHUB_REF_NAME}"
          safe_ref=$(echo "$ref_name" | tr '/@' '--')

          # Base tags
          tag_list=("$sha" "$safe_ref")

          # main => latest
          if [[ "$ref_type" == "branch" && "$ref_name" == "main" ]]; then
            tag_list+=("latest")
          fi

          # v1.2.3 => also 1.2.3
          if [[ "$ref_type" == "tag" && "$ref_name" =~ ^v(.+)$ ]]; then
            tag_list+=("${BASH_REMATCH[1]}")
          fi

          echo "Resolved tags: ${tag_list[*]}"

          mgmt_tags=""
          face_tags=""
          for t in "${tag_list[@]}"; do
            mgmt_tags+="${DOCKERHUB_REPO_CUSTOMER_MANAGEMENT}:$t\n"
            face_tags+="${DOCKERHUB_REPO_CUSTOMER_FACE}:$t\n"
          done

          mgmt_tags="${mgmt_tags%\\n}"
          face_tags="${face_tags%\\n}"

          {
            echo "customer_management<<EOF"
            echo -e "$mgmt_tags"
            echo "EOF"
            echo "customer_face<<EOF"
            echo -e "$face_tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push customer-management
        uses: docker/build-push-action@v6
        with:
          context: ./customer-management
          file: ./customer-management/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.tags.outputs.customer_management }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push customer-face
        uses: docker/build-push-action@v6
        with:
          context: ./customer-face
          file: ./customer-face/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.tags.outputs.customer_face }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

