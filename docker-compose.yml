version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: customer
      POSTGRES_PASSWORD: customer
      POSTGRES_DB: customer_mgmt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customer -d customer_mgmt"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s


  broker:
    image: apache/kafka:4.1.2
    container_name: broker
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://broker:9092,CONTROLLER://localhost:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker:9092 --list
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      broker:
        condition: service_healthy

  customer-management-api:
    build: ./customer-management
    environment:
      APP_MODE: web
      PYTHONPATH: /app
      FLASK_APP: app:create_app
      SQLALCHEMY_DATABASE_URI: postgresql://customer:customer@db:5432/customer_mgmt
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOG_LEVEL: INFO
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy

  purchases-kafka-consumer:
    build: ./customer-management
    command: ["python", "app.py"]
    environment:
      APP_MODE: kafka
      SQLALCHEMY_DATABASE_URI: postgresql://customer:customer@db:5432/customer_mgmt
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
      LOG_LEVEL: DEBUG
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python app.py' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy
      customer-face:
        condition: service_healthy

  customer-face:
    build: ./customer-face
    environment:
      PYTHONPATH: /app
      FLASK_APP: app:create_app
      CUSTOMER_MANAGEMENT_URL: http://customer-management-api:5000
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
      KAFKA_TOPIC: purchases
      LOG_LEVEL: INFO
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      customer-management-api:
        condition: service_healthy
      broker:
        condition: service_healthy

  sandbox:
    build: ./customer-face
    entrypoint: ["sleep", "infinity"]



volumes:
  pgdata:
